# arch-platform-cli 发布到 GitHub Packages
#
# 触发方式:
#   1. 手动触发:Actions → publish → Run workflow(选 tag)
#   2. 推送 tag:v* 触发(自动)
#
# 安装方式:
#   pip install --index-url https://pypi.pkg.github.com/AndyWongWithAI/simple/ arch-platform-cli

name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '发布版本 tag(如 v0.2.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: pip install build setuptools wheel

      - name: Build wheel + sdist
        run: python -m build

      - name: Publish to GitHub Packages
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/
          repository-url: https://pypi.pkg.github.com/AndyWongWithAI/
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}