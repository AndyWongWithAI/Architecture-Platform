{% extends "base.html" %}
{% block title %}登记核心思想{% endblock %}
{% block content %}
<div class="arch-title">
    <h1>登记核心思想</h1>
    <div class="arch-title-meta">
        <a href="/core-thoughts" style="font-size: 0.85rem; color: var(--arch-ink-2);">← 列表</a><br>
        <span style="color:var(--arch-ink-3); font-size: 0.85rem;">架构平台第 6 大事务型实体</span>
    </div>
</div>

<article class="arch-card" data-tone="brass">
    <form method="post" action="/core-thoughts/create">
        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">标题 * <small>(一句话主张)</small></span>
            <input type="text" name="title" required maxlength="500" placeholder="例:治理的道:让人不必记规范也能不犯规范上的错">
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">论点 * <small>(2-5 段精炼展开,Markdown)</small></span>
            <textarea name="thesis" required rows="8" placeholder="### 一句话&#10;...&#10;&#10;### 展开&#10;..."></textarea>
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">背景 <small>(困局/对比,Markdown)</small></span>
            <textarea name="rationale" rows="6" placeholder="### 过去的困局&#10;...&#10;&#10;### 真正的转变&#10;..."></textarea>
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">应用指引 <small>(How to apply,Markdown)</small></span>
            <textarea name="how_to_apply" rows="4" placeholder="### 应用 1&#10;...&#10;&#10;### 应用 2&#10;..."></textarea>
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">来源标注 <small>(origin)</small></span>
            <input type="text" name="origin" maxlength="200" placeholder="例:memory/dao-governance-philosophy.md">
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">状态</span>
            <select name="status">
                <option value="draft">draft(草稿)</option>
                <option value="active" selected>active(生效中)</option>
                <option value="superseded">superseded(已替代)</option>
                <option value="archived">archived(归档)</option>
            </select>
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">标签 <small>(逗号分隔)</small></span>
            <input type="text" name="tags" placeholder="governance, dao, feedback-loop">
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">道在 component 的应用 <small>(examples,JSON 数组)</small></span>
            <textarea name="examples" rows="6" placeholder='[&#10;  {"component_id": "feedback-cycle", "note": "闭环设计的灵魂"}&#10]'></textarea>
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-4);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">登记人 <small>(proposer)</small></span>
            <input type="text" name="proposer" value="web-ui" maxlength="100">
        </label>

        <div class="arch-toolbar" style="border-bottom: none;">
            <div class="arch-toolbar-left">
                <button type="submit">登记</button>
                <a href="/core-thoughts" role="button" class="secondary">取消</a>
            </div>
        </div>
    </form>
</article>
{% endblock %}
