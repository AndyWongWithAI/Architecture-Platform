{% extends "base.html" %}
{% block title %}登记需求{% endblock %}
{% block content %}
<div class="arch-title">
    <h1>登记新需求</h1>
    <div class="arch-title-meta">
        <span style="color:var(--arch-ink-3);">需求模块</span>
        {% if prefill_comp %}
        <br><span style="color:var(--arch-ink-3); font-size: 0.85rem;">预填组件:<a href="/components/{{ prefill_comp.name }}"><code>{{ prefill_comp.name }}</code></a></span>
        {% endif %}
    </div>
</div>

<article class="arch-card" data-tone="brass">
    <form method="post" action="/requirements/create">
        {% if prefill_comp %}
        <input type="hidden" name="component_id" value="{{ prefill_comp.id }}">
        {% endif %}

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">标题(20-200 字符)*</span>
            <input type="text" name="title" required minlength="20" maxlength="200"
                   placeholder="例:Redis 支持 cluster 模式自动 failover">
        </label>

        <div class="arch-action" style="border: none; padding: 0; margin: 0 0 var(--arch-s-3) 0;">
            <label class="arch-action-field" style="display:block;">
                <span>类型 *</span>
                <select name="type" required>
                    <option value="new_feature">新功能</option>
                    <option value="bug_fix">Bug 修复</option>
                    <option value="refactor">重构</option>
                    <option value="optimization">优化</option>
                    <option value="compliance">合规</option>
                    <option value="tech_debt">技术债</option>
                </select>
            </label>
            <label class="arch-action-field" style="display:block;">
                <span>优先级</span>
                <select name="priority">
                    <option value="P0">P0 紧急(24h)</option>
                    <option value="P1">P1 高(1 周内)</option>
                    <option value="P2" selected>P2 普通(当前迭代)</option>
                    <option value="P3">P3 低(backlog)</option>
                </select>
            </label>
        </div>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">描述</span>
            <textarea name="description" rows="3" placeholder="背景/上下文"></textarea>
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">用户故事</span>
            <textarea name="user_story" rows="2" placeholder="As a [角色], I want [能力], so that [价值]"></textarea>
        </label>

        <div class="arch-action" style="border: none; padding: 0; margin: 0 0 var(--arch-s-3) 0;">
            <label class="arch-action-field" style="display:block;">
                <span>负责人</span>
                <input type="text" name="assignee" placeholder="@用户名">
            </label>
            <label class="arch-action-field" style="display:block;">
                <span>截止日期</span>
                <input type="date" name="due_date">
            </label>
        </div>

        <label style="display:block; margin-bottom: var(--arch-s-4);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">标签(逗号分隔)</span>
            <input type="text" name="tags" placeholder="redis, ha, ops">
        </label>

        <div class="arch-toolbar" style="border-bottom: none;">
            <div class="arch-toolbar-left">
                <button type="submit">登记</button>
                <a href="/requirements" role="button" class="secondary">取消</a>
            </div>
        </div>
    </form>
</article>
{% endblock %}
