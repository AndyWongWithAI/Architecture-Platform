{% extends "base.html" %}
{% block title %}需求列表{% endblock %}
{% block content %}
<article>
    <header>
        <h1>📋 需求列表 <small>(共 {{ total }} 个)</small></h1>
        <p>
            <a href="/requirements/new" role="button" class="primary">+ 登记新需求</a>
        </p>
    </header>

    <!-- 过滤器 -->
    <form method="get" action="/requirements">
        <div class="grid">
            <select name="status" onchange="this.form.submit()">
                <option value="">所有状态</option>
                {% for s in ['draft','triaged','scheduled','in_progress','implemented','verified','complete','rejected','cancelled'] %}
                <option value="{{ s }}" {% if filters.status == s %}selected{% endif %}>{{ s | req_status_zh }}</option>
                {% endfor %}
            </select>
            <select name="priority" onchange="this.form.submit()">
                <option value="">所有优先级</option>
                {% for p in ['P0','P1','P2','P3'] %}
                <option value="{{ p }}" {% if filters.priority == p %}selected{% endif %}>{{ p }}</option>
                {% endfor %}
            </select>
            <select name="type" onchange="this.form.submit()">
                <option value="">所有类型</option>
                {% for t in ['new_feature','bug_fix','refactor','optimization','compliance','tech_debt'] %}
                <option value="{{ t }}" {% if filters.type == t %}selected{% endif %}>{{ t | req_type_zh }}</option>
                {% endfor %}
            </select>
            <input type="text" name="assignee" value="{{ filters.assignee or '' }}" placeholder="负责人" onchange="this.form.submit()">
        </div>
    </form>

    {% if items %}
    <figure>
        <table role="grid">
            <thead>
                <tr>
                    <th>优先级</th>
                    <th>类型</th>
                    <th>状态</th>
                    <th>标题</th>
                    <th>负责人</th>
                    <th>组件</th>
                </tr>
            </thead>
            <tbody>
                {% for r in items %}
                <tr>
                    <td><span class="{{ r.priority | req_priority_color }}"><strong>{{ r.priority }}</strong></span></td>
                    <td>{{ r.type | req_type_zh }}</td>
                    <td>{{ r.status | req_status_zh }}</td>
                    <td><a href="/requirements/{{ r.id }}">{{ r.title | truncate(60) }}</a></td>
                    <td>{{ r.assignee or '-' }}</td>
                    <td>{{ r.component_id[:8] if r.component_id else '-' }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </figure>
    {% else %}
    <p><em>暂无需求。<a href="/requirements/new">登记第一个需求 →</a></em></p>
    {% endif %}
</article>
{% endblock %}
