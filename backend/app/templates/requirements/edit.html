{% extends "base.html" %}
{% block title %}编辑需求 · {{ req.title }}{% endblock %}
{% block content %}
<div class="arch-title">
    <h1>编辑需求</h1>
    <div class="arch-title-meta">
        <span class="arch-title-id">{{ req.id[:8] }}</span><br>
        <a href="/requirements/{{ req.id }}" style="font-size: 0.85rem; color: var(--arch-ink-2);">← 返回详情</a>
    </div>
</div>

{# 锁定提示(仅 draft 可改 title) #}
{% if req.status != 'draft' %}
<article class="arch-card" data-tone="warn" style="padding: var(--arch-s-3) var(--arch-s-4);">
    <p style="margin: 0;"><small>⚠️ 当前状态 <code>{{ req.status }}</code>,title 字段已锁定(仅 draft 可改 title,对齐 CLAUDE.md 定位稳定性)</small></p>
</article>
{% endif %}

<article class="arch-card" data-tone="brass">
    <form method="post" action="/requirements/{{ req.id }}/edit">
        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">标题(20-200 字符){% if req.status != 'draft' %} · 锁定{% endif %}</span>
            <input type="text" name="title"
                   value="{{ req.title }}"
                   required minlength="20" maxlength="200"
                   {% if req.status != 'draft' %}readonly disabled{% endif %}>
            {% if req.status != 'draft' %}
            <small style="display: block; color: var(--arch-ink-2); margin-top: 4px;">title 仅 draft 状态可编辑。如需修改,请先回退到 draft。</small>
            {% endif %}
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">描述(背景/上下文)</span>
            <textarea name="description" rows="4"
                      placeholder="背景/上下文/触发原因">{{ req.description or '' }}</textarea>
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">用户故事</span>
            <textarea name="user_story" rows="2"
                      placeholder="As a [角色], I want [能力], so that [价值]">{{ req.user_story or '' }}</textarea>
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">验收标准(JSON,数组,每项 given/when/then)</span>
            <textarea name="acceptance_criteria" rows="6"
                      placeholder='[{"given":"...","when":"...","then":"..."}]'>{{ req.acceptance_criteria_json or '[]' }}</textarea>
            <small style="display:block; color: var(--arch-ink-2); margin-top: 4px;">支持 JSON 数组格式。空数组表示无 AC。</small>
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">非功能需求(JSON 对象,key/value 字符串)</span>
            <textarea name="nfr" rows="3"
                      placeholder='{"performance": "< 100ms p99", "security": "RBAC required"}'>{{ req.nfr_json or '{}' }}</textarea>
        </label>

        <div class="arch-action" style="border: none; padding: 0; margin: 0 0 var(--arch-s-3) 0;">
            <label class="arch-action-field" style="display:block;">
                <span>优先级</span>
                <select name="priority">
                    {% for p in ['P0', 'P1', 'P2', 'P3'] %}
                    <option value="{{ p }}" {% if req.priority == p %}selected{% endif %}>{{ p }}</option>
                    {% endfor %}
                </select>
            </label>
            <label class="arch-action-field" style="display:block;">
                <span>负责人</span>
                <input type="text" name="assignee"
                       value="{{ req.assignee or '' }}" placeholder="@用户名">
            </label>
        </div>

        <label style="display:block; margin-bottom: var(--arch-s-3);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">截止日期</span>
            <input type="date" name="due_date"
                   value="{{ req.due_date_input or '' }}">
        </label>

        <label style="display:block; margin-bottom: var(--arch-s-4);">
            <span style="display:block; font-family:'JetBrains Mono', monospace; font-size: var(--arch-fs-xs); color: var(--arch-ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--arch-s-1);">标签(逗号分隔)</span>
            <input type="text" name="tags"
                   value="{{ req.tags_csv or '' }}" placeholder="redis, ha, ops">
        </label>

        <div class="arch-toolbar" style="border-bottom: none;">
            <div class="arch-toolbar-left">
                <button type="submit">保存修改</button>
                <a href="/requirements/{{ req.id }}" role="button" class="secondary">取消</a>
            </div>
        </div>
    </form>
</article>
{% endblock %}
