# nginx-arch-platform.conf — 架构平台 nginx 反代配置
# 部署位置:/etc/nginx/sites-available/arch-platform(软链到 sites-enabled/)
# 测试:nginx -t
# 重载:systemctl reload nginx
#
# 公网入口:`arch.intelab.cn`(或 nginx 默认 server_name)→ 8088 → 127.0.0.1:8088

upstream arch_platform_backend {
    # 容器内 uvicorn 端口,通过 127.0.0.1 绑定的 docker-compose 端口转发
    server 127.0.0.1:8088;
    keepalive 16;
}

server {
    listen 8088;
    listen [::]:8088;

    # 公网域名(部署时改为实际域名;MVP 阶段可保留 _ 或注释)
    # server_name arch.intelab.cn;

    # 仅本机访问(MVP 阶段架构平台不走公网,通过 SSH 隧道或后续反代再暴露)
    # 取消注释下面这行使外部能直接访问:
    # allow all;
    # deny all;

    # 日志
    access_log /var/log/nginx/arch-platform.access.log;
    error_log  /var/log/nginx/arch-platform.error.log warn;

    # 上传大小(OpenAPI Spec 可能大)
    client_max_body_size 10M;

    # 反代核心
    location / {
        proxy_pass http://arch_platform_backend;

        # WebSocket / 长连接(MVP 暂不用,但 Web UI 后续会用到 SSE/HTMX)
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # 超时(SQLite 慢查询场景)
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Swagger UI / ReDoc / OpenAPI JSON 透传(同 / 反代即可,这里仅注释说明)

    # 健康检查(单独 fast-path,不写 access log)
    location = /healthz {
        proxy_pass http://arch_platform_backend/healthz;
        access_log off;
    }
}