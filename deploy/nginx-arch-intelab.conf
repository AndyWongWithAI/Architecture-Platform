# nginx-arch-intelab.conf — arch.intelab.cn 公网 HTTPS 反代
# 部署位置:/etc/nginx/sites-available/arch.intelab.cn
# 启用:ln -sf ... /etc/nginx/sites-enabled/arch.intelab.cn
# SSL 证书:由 certbot 申请并自动管理(Let's Encrypt)
#
# 流程:
#   1. DNS 加 A 记录:arch.intelab.cn → 124.71.219.208
#   2. 先 cp 此文件到 #1 + ln -s(用 nginx -t 检查语法)
#   3. certbot --nginx -d arch.intelab.cn(自动注入 SSL 配置)
#   4. nginx -s reload
#
# 证书自动续期:certbot.timer(cron 模拟,通常已装)

# 1. HTTP 重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name arch.intelab.cn;

    # certbot 验证用(acme-challenge),不要重定向
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # 其他全部 301 → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS 反代到 arch-platform 容器
server {
    listen 443 ssl http2;          # nginx 1.24 写法(http/2 跟在 listen)
    listen [::]:443 ssl http2;
    server_name arch.intelab.cn;

    # SSL 由 certbot 自动管理(申请后 certbot 会注入下面的字段,这里留 placeholder)
    # ssl_certificate /etc/letsencrypt/live/arch.intelab.cn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/arch.intelab.cn/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 日志
    access_log /var/log/nginx/arch-intelab.access.log;
    error_log  /var/log/nginx/arch-intelab.error.log warn;

    # 上传大小(OpenAPI Spec 可能大)
    client_max_body_size 10M;

    # 反代核心
    location / {
        proxy_pass http://127.0.0.1:8088;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # 健康检查(单独 fast-path)
    location = /healthz {
        proxy_pass http://127.0.0.1:8088/healthz;
        access_log off;
    }
}